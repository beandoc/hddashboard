services:
  - type: web
    name: hd-dashboard-pro
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hd-dashboard-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.10.0

databases:
  - name: hd-dashboard-db
    plan: free
    region: singapore # Change to your preferred region (oregon, frankfurt, etc.)
