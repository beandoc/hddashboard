<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - HD Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
    <style>
        body { font-family:'Inter',sans-serif; margin:0; padding:0; background-color:#f8fafc; -webkit-font-smoothing:antialiased; }
        h1,h2,h3 { font-family:'Outfit',sans-serif; }
        .container { max-width:480px; margin:48px auto; padding:32px; background:white; border-radius:16px; box-shadow:0 4px 24px rgba(0,0,0,0.08); }
        .form-group { margin-bottom:20px; }
        label { display:block; margin-bottom:6px; font-weight:600; font-size:0.8em; text-transform:uppercase; letter-spacing:0.04em; color:#64748b; }
        input { width:100%; padding:12px 14px; border:1px solid #e2e8f0; border-radius:10px; box-sizing:border-box; font-family:'Inter',sans-serif; font-size:0.95em; background:#f8fafc; outline:none; transition:border-color 0.2s; }
        input:focus { border-color:#0ea5e9; background:#fff; box-shadow:0 0 0 3px rgba(14,165,233,0.1); }
        .btn-submit { width:100%; padding:13px; background:#0ea5e9; color:white; border:none; border-radius:10px; font-weight:700; cursor:pointer; font-family:'Outfit',sans-serif; font-size:1em; transition:background 0.2s; }
        .btn-submit:hover { background:#0284c7; }
        .error { color:#dc2626; background:#fef2f2; border:1px solid #fee2e2; padding:10px 14px; border-radius:8px; margin-bottom:20px; font-size:0.88em; }
    </style>
</head>
<body>
    {% include "_nav.html" %}
    <div class="container">
        <h2>Change Password</h2>
        {% if error %}<div class="error">{{ error }}</div>{% endif %}
        <form method="POST">
            <div class="form-group">
                <label>Current Password</label>
                <input type="password" name="current_pw" required>
            </div>
            <div class="form-group">
                <label>New Password</label>
                <input type="password" name="new_pw" required minlength="6">
            </div>
            <div class="form-group">
                <label>Confirm New Password</label>
                <input type="password" name="confirm_pw" required minlength="6">
            </div>
            <button type="submit" class="btn-submit">Update Password</button>
        </form>
    </div>
</body>
</html>
