<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - HD Dashboard</title>
    <link rel="preload" href="/static/vendor/fonts/fonts.css" as="style" onload="this.onload=null;this.rel='stylesheet'"/>
    <noscript><link rel="stylesheet" href="/static/vendor/fonts/fonts.css"/></noscript>
    <link rel="preload" href="/static/vendor/fonts/material-icons.css" as="style" onload="this.onload=null;this.rel='stylesheet'"/>
    <noscript><link rel="stylesheet" href="/static/vendor/fonts/material-icons.css"/></noscript>
    <style>
        body { font-family:'Inter',sans-serif; margin:0; padding:0; background-color:#f8fafc; -webkit-font-smoothing:antialiased; }
        h1,h2,h3 { font-family:'Outfit',sans-serif; }
        .container { max-width:480px; margin:48px auto; padding:32px; background:white; border-radius:16px; box-shadow:0 4px 24px rgba(0,0,0,0.08); }
        .page-title { font-size:1.4rem; font-weight:800; margin:0 0 6px; color:#0f172a; display:flex; align-items:center; gap:8px; }
        .page-title i { color:#0ea5e9; font-size:1.3rem; }
        .page-subtitle { font-size:0.85rem; color:#64748b; margin:0 0 28px; }
        .form-group { margin-bottom:20px; }
        label { display:block; margin-bottom:6px; font-weight:600; font-size:0.78em; text-transform:uppercase; letter-spacing:0.04em; color:#64748b; }
        .input-wrap { position:relative; }
        input[type="password"] {
            width:100%; padding:12px 14px; border:1.5px solid #e2e8f0; border-radius:10px;
            box-sizing:border-box; font-family:'Inter',sans-serif; font-size:0.95em;
            background:#f8fafc; outline:none; transition:border-color 0.2s, box-shadow 0.2s;
        }
        input[type="password"]:focus { border-color:#0ea5e9; background:#fff; box-shadow:0 0 0 3px rgba(14,165,233,0.1); }
        input[type="password"].field-error { border-color:#ef4444 !important; background:#fef2f2 !important; }
        .field-error-msg {
            display:none; align-items:center; gap:4px;
            color:#dc2626; font-size:0.75rem; font-weight:700; margin-top:5px;
        }
        .field-error-msg.visible { display:flex; }
        .field-error-msg::before { content:'error'; font-family:'Material Icons'; font-size:0.9rem; flex-shrink:0; }

        /* Server-side error banner */
        .error-banner {
            background:#fef2f2; border:1px solid #fecaca; border-left:4px solid #dc2626;
            border-radius:12px; padding:14px 18px; margin-bottom:20px;
            display:flex; align-items:flex-start; gap:10px;
            font-size:0.88rem; color:#991b1b; line-height:1.5;
        }
        .error-banner i { font-size:1.2rem; flex-shrink:0; margin-top:1px; color:#dc2626; }

        .btn-submit {
            width:100%; padding:13px; background:#0ea5e9; color:white;
            border:none; border-radius:10px; font-weight:700; cursor:pointer;
            font-family:'Outfit',sans-serif; font-size:1em; transition:background 0.2s;
            display:flex; align-items:center; justify-content:center; gap:6px;
        }
        .btn-submit:hover { background:#0284c7; }
        .btn-submit:disabled { opacity:0.6; cursor:not-allowed; }
        .back-link { display:inline-flex; align-items:center; gap:4px; font-size:0.82rem; color:#64748b; text-decoration:none; margin-top:18px; }
        .back-link:hover { color:#0ea5e9; }

        @media (max-width: 640px) {
          .container { margin:16px; padding:20px; }
        }
    </style>
</head>
<body>
    {% include "_nav.html" %}
    <div class="container">
        <p class="page-title"><i class="material-icons">lock_reset</i> Change Password</p>
        <p class="page-subtitle">Enter your current password, then choose a new one.</p>

        {% if error %}
        <div class="error-banner" role="alert">
            <i class="material-icons">error_outline</i>
            <span>{{ error }}</span>
        </div>
        {% endif %}

        <form method="POST" id="changePwForm" novalidate>
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

            <div class="form-group">
                <label for="current_pw">Current Password</label>
                <div class="input-wrap">
                    <input type="password" id="current_pw" name="current_pw" required autocomplete="current-password">
                </div>
                <div class="field-error-msg" id="err_current">This field is required.</div>
            </div>

            <div class="form-group">
                <label for="new_pw">New Password</label>
                <div class="input-wrap">
                    <input type="password" id="new_pw" name="new_pw" required minlength="6" autocomplete="new-password"
                           oninput="validateMatch()">
                </div>
                <div class="field-error-msg" id="err_new">New password must be at least 6 characters.</div>
            </div>

            <div class="form-group">
                <label for="confirm_pw">Confirm New Password</label>
                <div class="input-wrap">
                    <input type="password" id="confirm_pw" name="confirm_pw" required minlength="6" autocomplete="new-password"
                           oninput="validateMatch()">
                </div>
                <div class="field-error-msg" id="err_confirm">Passwords do not match.</div>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">
                <i class="material-icons" style="font-size:1.1rem;">lock</i> Update Password
            </button>
        </form>
        <a href="/" class="back-link"><i class="material-icons" style="font-size:1rem;">arrow_back</i> Back to Dashboard</a>
    </div>

    <script>
    (function () {
        'use strict';

        var newPw = document.getElementById('new_pw');
        var confirmPw = document.getElementById('confirm_pw');
        var errNew = document.getElementById('err_new');
        var errConfirm = document.getElementById('err_confirm');

        window.validateMatch = function () {
            var np = newPw.value;
            var cp = confirmPw.value;

            // Validate new password length
            if (np.length > 0 && np.length < 6) {
                newPw.classList.add('field-error');
                errNew.textContent = 'New password must be at least 6 characters.';
                errNew.classList.add('visible');
            } else {
                newPw.classList.remove('field-error');
                errNew.classList.remove('visible');
            }

            // Validate confirm match (only when confirm has value)
            if (cp.length > 0 && np !== cp) {
                confirmPw.classList.add('field-error');
                errConfirm.textContent = 'Passwords do not match.';
                errConfirm.classList.add('visible');
            } else {
                confirmPw.classList.remove('field-error');
                errConfirm.classList.remove('visible');
            }
        };

        document.getElementById('changePwForm').addEventListener('submit', function (e) {
            var valid = true;
            var currentPw = document.getElementById('current_pw');
            var errCurrent = document.getElementById('err_current');

            // Current password required
            if (!currentPw.value.trim()) {
                currentPw.classList.add('field-error');
                errCurrent.textContent = 'Current password is required.';
                errCurrent.classList.add('visible');
                valid = false;
            } else {
                currentPw.classList.remove('field-error');
                errCurrent.classList.remove('visible');
            }

            // New password length
            if (newPw.value.length < 6) {
                newPw.classList.add('field-error');
                errNew.textContent = 'New password must be at least 6 characters.';
                errNew.classList.add('visible');
                valid = false;
            }

            // Passwords match
            if (newPw.value !== confirmPw.value) {
                confirmPw.classList.add('field-error');
                errConfirm.textContent = 'Passwords do not match.';
                errConfirm.classList.add('visible');
                valid = false;
            }

            if (!valid) {
                e.preventDefault();
                return;
            }

            // Disable submit to prevent double-submit
            var btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = '<svg style="width:16px;height:16px;animation:cpSpin 0.8s linear infinite;" viewBox="0 0 24 24" fill="none">'
                + '<circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" opacity="0.25"/>'
                + '<path d="M12 2a10 10 0 0 1 10 10" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>'
                + '</svg> Updating…';
        });
    })();
    </script>
    <style>@keyframes cpSpin { to { transform:rotate(360deg); } }</style>
</body>
</html>
