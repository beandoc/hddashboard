{% extends "base.html" %}
{% block title %}Two-Factor Authentication{% endblock %}

{% block content %}
<div class="container" style="max-width:400px;margin:80px auto;">
  <div class="card shadow-sm p-4">
    <h4 class="mb-1"><i class="bi bi-shield-check text-success me-2"></i>Two-Factor Authentication</h4>
    <p class="text-muted small mb-3">Enter the 6-digit code from your authenticator app to continue.</p>

    {% if error %}
    <div class="alert alert-danger py-2">{{ error }}</div>
    {% endif %}

    <form method="post" action="/mfa/verify">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
      <div class="mb-3">
        <label class="form-label fw-semibold">Authenticator code</label>
        <input type="text" name="totp_code" class="form-control form-control-lg text-center"
               placeholder="000000" maxlength="6" pattern="\d{6}" autocomplete="one-time-code"
               inputmode="numeric" autofocus required>
      </div>
      <button type="submit" class="btn btn-primary w-100">Verify</button>
    </form>

    <div class="mt-3 text-center">
      <a href="/logout" class="text-muted small">Cancel and log out</a>
    </div>
  </div>
</div>
{% endblock %}
