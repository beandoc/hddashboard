<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Record {{ test_type }} - Research Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5; --bg-body: #f8fafc; --bg-card: #ffffff;
            --border: #e2e8f0; --text-dark: #0f172a; --text-muted: #64748b;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg-body); color: var(--text-dark); margin: 0; padding-bottom: 60px; }
        header { background: white; padding: 20px 32px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        .back-link { color: var(--text-muted); text-decoration: none; display: inline-flex; align-items: center; gap: 5px; font-weight: 500; font-size: 0.9rem; }
        .back-link:hover { color: var(--primary); }
        
        .container { max-width: 800px; margin: 30px auto; padding: 0 20px; }
        .card { background: var(--bg-card); border-radius: 12px; padding: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid var(--border); }
        
        .patient-info { display: flex; align-items: center; gap: 15px; background: #f1f5f9; padding: 15px 20px; border-radius: 8px; margin-bottom: 24px; border-left: 4px solid var(--primary); }
        .patient-info i { font-size: 2rem; color: var(--primary); }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .full-width { grid-column: 1 / -1; }
        
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem; color: #334155; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 8px; font-family: 'Inter'; font-size: 0.95rem; box-sizing: border-box; }
        .form-group input:focus, .form-group select:focus { border-color: var(--primary); outline: none; }
        
        .btn-primary { background: var(--primary); color: white; padding: 12px 24px; border-radius: 8px; text-decoration: none; font-weight: 600; border: none; cursor: pointer; width: 100%; font-size: 1rem; margin-top: 20px; }
        .btn-primary:hover { background: #4338ca; }
        
        .dynamic-fields-container { background: #fffcf0; padding: 20px; border-radius: 8px; border: 1px solid #fde68a; margin-top: 10px; margin-bottom: 20px; }
        .dynamic-fields-container h3 { margin-top: 0; color: #b45309; font-family: 'Outfit'; display: flex; align-items: center; gap: 8px; font-size: 1.1rem; }
    </style>
</head>
<body>
    {% include "_nav.html" %}
    
    <header>
        <div>
            <a href="/research/projects/{{ project.id }}" class="back-link"><i class="material-icons" style="font-size:1.1rem;">arrow_back</i> Back to {{ project.title }}</a>
            <h1 style="margin: 10px 0 0 0; font-family: 'Outfit'; color: var(--primary);">Data Entry: {{ test_type }}</h1>
        </div>
    </header>

    <div class="container">
        <div class="card">
            <div class="patient-info">
                <i class="material-icons">account_circle</i>
                <div>
                    <strong style="font-size: 1.1rem;">{{ patient.name }}</strong>
                    <div style="color: var(--text-muted); font-size: 0.85rem; margin-top: 4px;">HID: {{ patient.hid_no }} | Age: {{ patient.age }} | Access: {{ patient.access_type }}</div>
                </div>
            </div>

            <form action="/research/projects/{{ project.id }}/record" method="POST">
                <input type="hidden" name="patient_id" value="{{ patient.id }}">
                <input type="hidden" name="test_type" value="{{ test_type }}">
                
                <div class="form-grid">
                    <div class="form-group">
                        <label>Evaluation Date</label>
                        <input type="date" name="test_date" id="test_date" required>
                    </div>
                </div>

                <div class="dynamic-fields-container" id="dynamicFields">
                    <h3><i class="material-icons">science</i> Specific Metrics</h3>
                    <div class="form-grid" id="fieldsArea">
                        <!-- JS injects fields here based on test_type -->
                    </div>
                </div>

                <div class="form-group full-width">
                    <label>Clinical Notes / Methodological Remarks</label>
                    <textarea name="notes" rows="3" placeholder="Enter any specific conditions during the test..."></textarea>
                </div>
                
                <button type="submit" class="btn-primary">Save Research Record</button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('test_date').valueAsDate = new Date();
        
        const testType = "{{ test_type }}";
        const fieldsArea = document.getElementById('fieldsArea');
        
        const fieldSchemas = {
            "NT_PRO_BNP": [
                { name: "nt_pro_bnp_value", label: "NT-Pro BNP (pg/mL)", type: "number", step: "1" },
                { name: "assay_method", label: "Assay Method", type: "text" }
            ],
            "HANDGRIP_STRENGTH": [
                { name: "dominant_hand_kg", label: "Dominant Hand (kg)", type: "number", step: "0.1" },
                { name: "nondominant_hand_kg", label: "Non-Dominant Hand (kg)", type: "number", step: "0.1" },
                { name: "dynamometer_model", label: "Dynamometer Model", type: "text" }
            ],
            "MOCA": [
                { name: "total_score", label: "Total Score (out of 30)", type: "number", step: "1", max: "30" },
                { name: "visuospatial_executive", label: "Visuospatial / Executive (5)", type: "number", max: "5" },
                { name: "naming", label: "Naming (3)", type: "number", max: "3" },
                { name: "attention", label: "Attention (6)", type: "number", max: "6" },
                { name: "language", label: "Language (3)", type: "number", max: "3" },
                { name: "abstraction", label: "Abstraction (2)", type: "number", max: "2" },
                { name: "delayed_recall", label: "Delayed Recall (5)", type: "number", max: "5" },
                { name: "orientation", label: "Orientation (6)", type: "number", max: "6" }
            ],
            "SGA": [
                { name: "sga_score", label: "SGA Score (1-7 or A/B/C)", type: "text" },
                { name: "weight_change_pct", label: "Weight Change (%)", type: "number", step: "0.1" },
                { name: "muscle_wasting", label: "Muscle Wasting", type: "select", options: ["None", "Mild", "Moderate", "Severe"] },
                { name: "subcutaneous_fat_loss", label: "Fat Loss", type: "select", options: ["None", "Mild", "Moderate", "Severe"] }
            ],
            "BIA": [
                { name: "phase_angle", label: "Phase Angle (degrees)", type: "number", step: "0.1" },
                { name: "tbw_liters", label: "Total Body Water (L)", type: "number", step: "0.1" },
                { name: "ecw_liters", label: "Extracellular Water (L)", type: "number", step: "0.1" },
                { name: "lean_tissue_index", label: "Lean Tissue Index (LTI)", type: "number", step: "0.1" }
            ],
            "VEXUS": [
                { name: "ivc_diameter_cm", label: "IVC Diameter (cm)", type: "number", step: "0.1" },
                { name: "hepatic_vein_doppler", label: "Hepatic Vein Doppler", type: "select", options: ["Normal", "S<D", "S reversal"] },
                { name: "portal_vein_pulsatility", label: "Portal Vein Pulsatility (%)", type: "number", step: "1" },
                { name: "renal_vein_doppler", label: "Intrarenal Vein Doppler", type: "select", options: ["Continuous", "Biphasic", "Monophasic"] },
                { name: "vexus_grade", label: "VExUS Grade", type: "select", options: ["Grade 0", "Grade 1", "Grade 2", "Grade 3"] }
            ],
            "DIASTOLIC_ECHO": [
                { name: "e_velocity", label: "E Velocity (cm/s)", type: "number", step: "1" },
                { name: "a_velocity", label: "A Velocity (cm/s)", type: "number", step: "1" },
                { name: "e_a_ratio", label: "E/A Ratio", type: "number", step: "0.1" },
                { name: "average_e_prime", label: "Average e' (cm/s)", type: "number", step: "0.1" },
                { name: "e_e_prime_ratio", label: "E/e' Ratio", type: "number", step: "0.1" },
                { name: "lavi", label: "LA Volume Index (mL/m²)", type: "number", step: "0.1" },
                { name: "peak_tr_velocity", label: "Peak TR Velocity (m/s)", type: "number", step: "0.1" },
                { name: "diastolic_grade", label: "Diastolic Grade", type: "select", options: ["Normal", "Grade I (Impaired)", "Grade II (Pseudonormal)", "Grade III (Restrictive)"] }
            ],
            "MIA_SCORING": [
                { name: "serum_albumin", label: "Serum Albumin (g/dL)", type: "number", step: "0.1" },
                { name: "body_weight", label: "Body Weight (kg)", type: "number", step: "0.1" },
                { name: "serum_crp", label: "Serum CRP (mg/dL)", type: "number", step: "0.01" },
                { name: "history_cv_event", label: "History of CV Event (AMI/CVA/CVD)", type: "select", options: ["No", "Yes"] },
                { name: "history_invasive_proc", label: "History of Invasive Procedure (PCI/CABG/PTA)", type: "select", options: ["No", "Yes"] }
            ],
            "FGF23": [
                { name: "fgf23_value", label: "FGF-23 Level (pg/mL)", type: "number", step: "0.1" },
                { name: "assay_type", label: "Assay Type", type: "select", options: ["Intact FGF-23 (iFGF)", "C-Terminal FGF-23 (cFGF)"] },
                { name: "lab_name", label: "Processing Lab", type: "text" }
            ],
            "STEPS_ACTIVITY": [
                { name: "avg_steps_per_day", label: "Average Steps / Day", type: "number", step: "1" },
                { name: "tracking_duration_days", label: "Tracking Period (Days)", type: "number", step: "1" },
                { name: "device_method", label: "Tracking Device", type: "select", options: ["Smartphone", "Smartwatch / Fitbit", "Pedometor", "Self-Report Log"] },
                { name: "sedentary_minutes", label: "Sedentary Time (min/day)", type: "number" }
            ],
            "SKIN_FOLD": [
                { name: "triceps_mm", label: "Triceps Skinfold (mm)", type: "number", step: "0.1" },
                { name: "biceps_mm", label: "Biceps Skinfold (mm)", type: "number", step: "0.1" },
                { name: "subscapular_mm", label: "Subscapular Skinfold (mm)", type: "number", step: "0.1" },
                { name: "suprailiac_mm", label: "Suprailiac Skinfold (mm)", type: "number", step: "0.1" },
                { name: "mid_arm_circumference_cm", label: "Mid-Arm Circumference (cm)", type: "number", step: "0.1" }
            ],
            "LUNG_USG": [
                { name: "total_b_lines", label: "Total B-Lines (Sum of zones)", type: "number" },
                { name: "zones_scanned", label: "Number of Zones Scanned", type: "select", options: ["8", "28"] },
                { name: "pleural_effusion", label: "Pleural Effusion Present", type: "select", options: ["No", "Yes - Right", "Yes - Left", "Yes - Bilateral"] }
            ],
            "AUTONOMIC_TEST": [
                { name: "hrv", label: "Heart Rate Variability (ms)", type: "number" },
                { name: "valsalva_ratio", label: "Valsalva Ratio", type: "number", step: "0.01" },
                { name: "orthostatic_drop", label: "Orthostatic SBP Drop (mmHg)", type: "number" }
            ],
            "EDMONTON_FRAIL_SCALE": [
                { name: "efs_cognition", label: "Cognition (Clock Test)", type: "select", options: [
                    { value: "0", label: "No errors (0)" },
                    { value: "1", label: "Minor spacing errors (1)" },
                    { value: "2", label: "Other errors (2)" }
                ]},
                { name: "efs_hospitalization", label: "General Health (Hospital admissions in past year)", type: "select", options: [
                    { value: "0", label: "0 (0)" },
                    { value: "1", label: "1-2 (1)" },
                    { value: "2", label: "≥2 (2)" }
                ]},
                { name: "efs_self_health", label: "General Health (Self-rated health)", type: "select", options: [
                    { value: "0", label: "Excellent / Very good / Good (0)" },
                    { value: "1", label: "Fair (1)" },
                    { value: "2", label: "Poor (2)" }
                ]},
                { name: "efs_independence", label: "Functional Independence (Help with 8 activities)", type: "select", options: [
                    { value: "0", label: "0–1 activities (0)" },
                    { value: "1", label: "2–4 activities (1)" },
                    { value: "2", label: "5–8 activities (2)" }
                ]},
                { name: "efs_social_support", label: "Social Support (Help available when needed)", type: "select", options: [
                    { value: "0", label: "Always (0)" },
                    { value: "1", label: "Sometimes (1)" },
                    { value: "2", label: "Never (2)" }
                ]},
                { name: "efs_med_polypharmacy", label: "Medication Use (≥5 prescription drugs)", type: "select", options: [
                    { value: "0", label: "No (0)" },
                    { value: "1", label: "Yes (1)" }
                ]},
                { name: "efs_med_compliance", label: "Medication Use (Forget to take meds)", type: "select", options: [
                    { value: "0", label: "No (0)" },
                    { value: "1", label: "Yes (1)" }
                ]},
                { name: "efs_nutrition", label: "Nutrition (Recent weight loss / loose clothes)", type: "select", options: [
                    { value: "0", label: "No (0)" },
                    { value: "1", label: "Yes (1)" }
                ]},
                { name: "efs_mood", label: "Mood (Often feel sad or depressed)", type: "select", options: [
                    { value: "0", label: "No (0)" },
                    { value: "1", label: "Yes (1)" }
                ]},
                { name: "efs_continence", label: "Continence (Losing control of urine)", type: "select", options: [
                    { value: "0", label: "No (0)" },
                    { value: "1", label: "Yes (1)" }
                ]},
                { name: "efs_functional_perf", label: "Functional Performance (Timed Get Up & Go)", type: "select", options: [
                    { value: "0", label: "0–10 s (0)" },
                    { value: "1", label: "11–20 s (1)" },
                    { value: "2", label: ">20 s / Unwilling / Assisted (2)" }
                ]},
                { name: "efs_total_score", label: "Total EFS Score", type: "number", min: "0", max: "17", readonly: true },
                { name: "efs_category", label: "Frailty Category", type: "text", readonly: true }
            ],
            "PSQI": [
                { name: "psqi_comp1", label: "Component 1: Subjective Sleep Quality (0-3)", type: "select", options: [
                    { value: "0", label: "Very good (0)" },
                    { value: "1", label: "Fairly good (1)" },
                    { value: "2", label: "Fairly bad (2)" },
                    { value: "3", label: "Very bad (3)" }
                ]},
                { name: "psqi_comp2", label: "Component 2: Sleep Latency (0-3)", type: "select", options: [
                    { value: "0", label: "0 (0)" },
                    { value: "1", label: "1-2 (1)" },
                    { value: "2", label: "3-4 (2)" },
                    { value: "3", label: "5-6 (3)" }
                ]},
                { name: "psqi_comp3", label: "Component 3: Sleep Duration (0-3)", type: "select", options: [
                    { value: "0", label: "> 7 hours (0)" },
                    { value: "1", label: "6-7 hours (1)" },
                    { value: "2", label: "5-6 hours (2)" },
                    { value: "3", label: "< 5 hours (3)" }
                ]},
                { name: "psqi_comp4", label: "Component 4: Sleep Efficiency (0-3)", type: "select", options: [
                    { value: "0", label: "> 85% (0)" },
                    { value: "1", label: "75-84% (1)" },
                    { value: "2", label: "65-74% (2)" },
                    { value: "3", label: "< 65% (3)" }
                ]},
                { name: "psqi_comp5", label: "Component 5: Sleep Disturbances (0-3)", type: "select", options: [
                    { value: "0", label: "0 (0)" },
                    { value: "1", label: "1-9 (1)" },
                    { value: "2", label: "10-18 (2)" },
                    { value: "3", label: "19-27 (3)" }
                ]},
                { name: "psqi_comp6", label: "Component 6: Use of Sleep Medication (0-3)", type: "select", options: [
                    { value: "0", label: "Not during the past month (0)" },
                    { value: "1", label: "Less than once a week (1)" },
                    { value: "2", label: "Once or twice a week (2)" },
                    { value: "3", label: "Three or more times a week (3)" }
                ]},
                { name: "psqi_comp7", label: "Component 7: Daytime Dysfunction (0-3)", type: "select", options: [
                    { value: "0", label: "0 (0)" },
                    { value: "1", label: "1-2 (1)" },
                    { value: "2", label: "3-4 (2)" },
                    { value: "3", label: "5-6 (3)" }
                ]},
                { name: "psqi_global_score", label: "Global PSQI Score", type: "number", min: "0", max: "21", readonly: true },
                { name: "psqi_interpretation", label: "Interpretation", type: "text", readonly: true }
            ],
            "CIMT": [
                { name: "cimt_right_mm", label: "Right Carotid IMT (mm)", type: "number", step: "0.01" },
                { name: "cimt_left_mm", label: "Left Carotid IMT (mm)", type: "number", step: "0.01" },
                { name: "cimt_average_mm", label: "Mean CIMT (mm)", type: "number", step: "0.01", readonly: true },
                { name: "carotid_plaque_present", label: "Carotid Plaque Present", type: "select", options: ["None", "Right Side", "Left Side", "Bilateral"] }
            ],
            "AVF_PAIN": [
                { name: "pain_score", label: "Pain Score (VAS/NRS: 0-10)", type: "number", min: "0", max: "10" },
                { name: "pain_severity", label: "Pain Severity", type: "text", readonly: true },
                { name: "needle_gauge", label: "Needle Gauge", type: "select", options: ["15G", "16G", "17G"] },
                { name: "cannulation_technique", label: "Cannulation Technique", type: "select", options: ["Rope Ladder", "Buttonhole", "Area Cannulation"] },
                { name: "topical_anesthetic", label: "Topical Anesthetic Used", type: "select", options: ["No", "Yes (EMLA/Lignocaine)"] }
            ],
            "CUSTOM_VARIABLE": [
                { name: "variable_id", label: "Select Variable", type: "select", options: [
                    {% for v in all_variables %}
                    { value: "{{ v.id }}", label: "{{ v.display_name }} ({{ v.unit }})" },
                    {% endfor %}
                ]},
                { name: "value", label: "Value", type: "number", step: "0.01" }
            ],
            "OTHER": [
                { name: "custom_test_name", label: "Test Name", type: "text" },
                { name: "result_value", label: "Result/Finding", type: "text" }
            ]
        };

        function renderFields() {
            const schema = fieldSchemas[testType];
            if (!schema) return;

            let html = '';
            schema.forEach(field => {
                const stepAttr = field.step ? `step="${field.step}"` : '';
                const maxAttr = field.max ? `max="${field.max}"` : '';
                const minAttr = field.min ? `min="${field.min}"` : '';
                const readonlyAttr = field.readonly ? 'readonly style="background:#f1f5f9; cursor:not-allowed;"' : '';
                
                let inputHtml = '';
                if (field.type === 'select') {
                    const options = field.options.map(o => {
                        const val = (typeof o === 'object') ? o.value : o;
                        const lab = (typeof o === 'object') ? o.label : o;
                        return `<option value="${val}">${lab}</option>`;
                    }).join('');
                    inputHtml = `<select name="${field.name}" ${readonlyAttr}><option value="">-- Select --</option>${options}</select>`;
                } else {
                    inputHtml = `<input type="${field.type}" name="${field.name}" ${stepAttr} ${maxAttr} ${minAttr} ${readonlyAttr} placeholder="Enter value...">`;
                }

                html += `
                    <div class="form-group">
                        <label>${field.label}</label>
                        ${inputHtml}
                    </div>
                `;
            });
            fieldsArea.innerHTML = html;

            // Auto-calculate EFS total score and category
            if (testType === 'EDMONTON_FRAIL_SCALE') {
                const inputs = fieldsArea.querySelectorAll('select[name^="efs_"], input[name^="efs_"]:not([name="efs_total_score"]):not([name="efs_category"])');
                const totalInput = fieldsArea.querySelector('input[name="efs_total_score"]');
                const categoryInput = fieldsArea.querySelector('input[name="efs_category"]');
                
                const updateScore = () => {
                    let total = 0;
                    inputs.forEach(i => {
                        total += parseInt(i.value || 0);
                    });
                    totalInput.value = total;
                    
                    let category = "";
                    if (total <= 5) category = "Not Frail";
                    else if (total <= 7) category = "Vulnerable";
                    else if (total <= 9) category = "Mild Frailty";
                    else if (total <= 11) category = "Moderate Frailty";
                    else category = "Severe Frailty";
                    categoryInput.value = category;
                };

                inputs.forEach(input => {
                    input.addEventListener('change', updateScore);
                    input.addEventListener('input', updateScore);
                });
            }

            // Auto-calculate PSQI total score and interpretation
            if (testType === 'PSQI') {
                const inputs = fieldsArea.querySelectorAll('select[name^="psqi_comp"]');
                const totalInput = fieldsArea.querySelector('input[name="psqi_global_score"]');
                const interpretationInput = fieldsArea.querySelector('input[name="psqi_interpretation"]');
                
                const updatePSQI = () => {
                    let total = 0;
                    inputs.forEach(i => {
                        total += parseInt(i.value || 0);
                    });
                    totalInput.value = total;
                    interpretationInput.value = (total > 5) ? "Poor Sleep Quality" : "Good Sleep Quality";
                };

                inputs.forEach(input => {
                    input.addEventListener('change', updatePSQI);
                });
            }

            // Auto-calculate Mean CIMT
            if (testType === 'CIMT') {
                const rightInput = fieldsArea.querySelector('input[name="cimt_right_mm"]');
                const leftInput = fieldsArea.querySelector('input[name="cimt_left_mm"]');
                const averageInput = fieldsArea.querySelector('input[name="cimt_average_mm"]');
                
                const updateCIMT = () => {
                    const r = parseFloat(rightInput.value) || 0;
                    const l = parseFloat(leftInput.value) || 0;
                    if (r > 0 && l > 0) {
                        averageInput.value = ((r + l) / 2).toFixed(2);
                    } else if (r > 0 || l > 0) {
                        averageInput.value = (r || l).toFixed(2);
                    } else {
                        averageInput.value = "";
                    }
                };

                [rightInput, leftInput].forEach(input => {
                    input.addEventListener('input', updateCIMT);
                });
            }

            // Auto-interpret AVF Pain
            if (testType === 'AVF_PAIN') {
                const painInput = fieldsArea.querySelector('input[name="pain_score"]');
                const severityInput = fieldsArea.querySelector('input[name="pain_severity"]');
                
                const updatePain = () => {
                    const score = parseInt(painInput.value);
                    if (isNaN(score)) {
                        severityInput.value = "";
                        return;
                    }
                    if (score === 0) severityInput.value = "No Pain";
                    else if (score <= 3) severityInput.value = "Mild Pain";
                    else if (score <= 6) severityInput.value = "Moderate Pain";
                    else severityInput.value = "Severe Pain";
                };

                painInput.addEventListener('input', updatePain);
            }
        }

        renderFields();
    </script>
</body>
</html>
