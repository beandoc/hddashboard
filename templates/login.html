<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - HD Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --primary: #1a237e;
            --accent: #007bff;
            --bg: #f0f2f5;
        }
        body { 
            font-family: 'Roboto', sans-serif; 
            margin: 0; 
            padding: 0; 
            background: linear-gradient(135deg, #1a237e 0%, #0d47a1 100%);
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden;
        }
        .login-card { 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(10px);
            padding: 40px; 
            border-radius: 16px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.4); 
            width: 100%; 
            max-width: 400px; 
            text-align: center; 
            transform: translateY(0);
            transition: all 0.3s ease;
        }
        .login-card:hover {
            transform: translateY(-5px);
        }
        .logo-icon {
            font-size: 3rem;
            color: var(--primary);
            margin-bottom: 15px;
        }
        h1 { margin: 0 0 8px; color: var(--primary); font-size: 2em; font-weight: 700; }
        p.subtitle { color: #666; margin-bottom: 30px; font-size: 0.9em; }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 8px; font-weight: 500; color: #444; font-size: 0.85em; text-transform: uppercase; letter-spacing: 0.5px; }
        input { 
            width: 100%; 
            padding: 14px; 
            border: 2px solid #eee; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 1em; 
            transition: border-color 0.2s;
            outline: none;
        }
        input:focus { border-color: var(--accent); }
        .btn-login { 
            width: 100%; 
            background: var(--primary); 
            color: white; 
            padding: 14px; 
            border: none; 
            border-radius: 8px; 
            font-size: 1.1em; 
            font-weight: 700; 
            cursor: pointer; 
            margin-top: 10px; 
            transition: all 0.2s; 
            box-shadow: 0 4px 6px rgba(26, 35, 126, 0.2);
        }
        .btn-login:hover { background: #0d47a1; transform: translateY(-1px); box-shadow: 0 6px 12px rgba(26, 35, 126, 0.3); }
        .error { color: #d32f2f; background: #ffeef0; padding: 12px; border-radius: 8px; margin-bottom: 20px; font-size: 0.85em; border: 1px solid #ffcdd2; }
        .footer { margin-top: 30px; color: #888; font-size: 0.75em; letter-spacing: 0.5px; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo-icon">🏥</div>
        <h1>HD Dashboard</h1>
        <p class="subtitle">Nephrology Unit Management System</p>
        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}
        <form method="POST" action="/login" enctype="application/x-www-form-urlencoded">
            <div class="form-group">
                <label>Clinical ID / Username</label>
                <input type="text" name="username" placeholder="Enter username" required autofocus>
            </div>
            <div class="form-group">
                <label>Secure Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-login">Sign In</button>
        </form>
        <div class="footer">CH(SC) CLINICAL DATA DIVISION © 2026</div>
    </div>
</body>
</html>
